server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: api-gateway
  data:
    redis:
      url: ${REDIS_URL}
      timeout: 5000
  cloud:
    gateway:
      filter:
        circuit-breaker:
          enabled: true
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
            methods: GET
            backoff:
              firstBackoff: 100ms
              maxBackoff: 500ms
              factor: 2
              basedOnPreviousValue: true
        - name: CircuitBreaker
          args:
            name: defaultCircuitBreaker
            fallbackUri: forward:/fallback
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:3000
              - ${FE_DOMAIN}
              - ${BE_DOMAIN}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: iam-service
          uri: lb://iam-service
          predicates:
            - Path=/iam-service/**
          filters:
            - StripPrefix=1

        - id: iam-service-swagger
          uri: lb://iam-service
          predicates:
            - Path=/iam-service/v3/api-docs/**
          filters:
            - RewritePath=/iam-service/v3/api-docs(?<segment>.*), /v3/api-docs${segment}
        #######################################################################################
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/inventory-service/**
          filters:
            - StripPrefix=1

        - id: inventory-service-swagger
          uri: lb://inventory-service
          predicates:
            - Path=/inventory-service/v3/api-docs/**
          filters:
            - RewritePath=/inventory-service/v3/api-docs(?<segment>.*), /v3/api-docs${segment}
        #######################################################################################
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notification-service/**
          filters:
            - StripPrefix=1
        - id: notification-service-swagger
          uri: lb://notification-service
          predicates:
            - Path=/notification-service/v3/api-docs/**
          filters:
            - RewritePath=/notification-service/v3/api-docs(?<segment>.*), /v3/api-docs${segment}
        #######################################################################################
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/order-service/**
          filters:
            - StripPrefix=1
        - id:  order-service-swagger
          uri: lb://order-service
          predicates:
            - Path=/order-service/v3/api-docs/**
          filters:
            - RewritePath=/order-service/v3/api-docs(?<segment>.*), /v3/api-docs${segment}
        #######################################################################################
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payment-service/**
          filters:
            - StripPrefix=1
        - id: payment-service-swagger
          uri: lb://payment-service
          predicates:
            - Path=/payment-service/v3/api-docs/**
          filters:
            - RewritePath=/payment-service/v3/api-docs(?<segment>.*), /v3/api-docs${segment}
        #######################################################################################
        - id: checkin-service
          uri: lb://checkin-service
          predicates:
            - Path=/checkin-service/**
          filters:
            - StripPrefix=1
        - id: checkin-service-swagger
          uri: lb://checkin-service
          predicates:
            - Path=/checkin-service/v3/api-docs/**
          filters:
            - RewritePath=/checkin-service/v3/api-docs(?<segment>.*), /v3/api-docs${segment}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    URLs:
      - name: IAM Service
        url: /iam-service/v3/api-docs
      - name: Inventory Service
        url: /inventory-service/v3/api-docs
      - name: Notification Service
        url: /notification-service/v3/api-docs
      - name: Order Service
        url: /order-service/v3/api-docs
      - name: Payment Service
        url: /payment-service/v3/api-docs
      - name: Checkin Service
        url: /checkin-service/v3/api-docs
    urls-primary-name: IAM Service

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      defaultCircuitBreaker:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 120s
    instances:
      defaultCircuitBreaker:
        baseConfig: default

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,circuitbreakers,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
        enabled: true
  health:
    redis:
      enabled: true
  tracing:
    sampling:
      probability: 0.1
  otlp:
    tracing:
      endpoint: http://otel-collector:4318/v1/traces

logging:
  pattern:
    level: "%5p [traceId=%X{traceId}, spanId=%X{spanId}]"

